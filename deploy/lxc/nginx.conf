# Rackula nginx configuration for LXC native deployment
# Unlike the Docker template (nginx.conf.template), this is a static config
# with no envsubst — token injection uses an included snippet instead.
#
# CROSS-REF: deploy/nginx.conf.template is the Docker variant (envsubst processed).
# Key differences: Docker uses envsubst variables (${API_HOST}, ${API_PORT}, etc.)
# and auth_request for local/OIDC auth; LXC uses a static snippet for token
# injection and has no auth_request support. When updating routing or proxy
# logic in one, check if the other needs the same change.

# Authorization header handling for API proxying.
# If write token is configured and request method is PUT/DELETE,
# inject "Bearer <token>" for upstream write-route auth.
# Token snippet is generated by the install script at:
#   /etc/nginx/snippets/rackula-api-token.conf
include /etc/nginx/snippets/rackula-api-token.conf;

map $request_method $rackula_is_write_method {
    default 0;
    PUT 1;
    DELETE 1;
}

map "$rackula_has_api_write_token" $rackula_token_check {
    default 0;
    1 1;
}

map "$rackula_is_write_method:$rackula_token_check" $rackula_api_authorization {
    default $http_authorization;
    "1:1" "Bearer $rackula_api_write_token";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /opt/rackula/frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml;

    # Cache static assets (fingerprinted by Vite — safe to cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # nginx drops ALL server-level add_header directives when a location block
        # defines its own — include shared security headers to avoid drift.
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Runtime storage mode config, written by the install script into the
    # frontend root. no-cache: a stale mode after a reinstall would silently
    # flip storage behavior.
    location = /config.js {
        add_header Cache-Control "no-cache" always;

        # nginx drops ALL server-level add_header directives when a location block
        # defines its own; include shared security headers to avoid drift.
        include /etc/nginx/snippets/security-headers.conf;
    }

    # API health check — used by frontend to detect persistence API availability
    location = /api/health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
    }

    # Handle /api and /api/ edge cases — return JSON error, not SPA fallback
    location = /api {
        default_type application/json;
        return 400 '{"error": "Invalid API path", "hint": "Use /api/layouts, /api/assets, or /api/health"}';
    }

    location = /api/ {
        default_type application/json;
        return 400 '{"error": "Invalid API path", "hint": "Use /api/layouts, /api/assets, or /api/health"}';
    }

    location /api/ {
        # Strip /api prefix: /api/layouts -> /layouts
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # LXC config uses $scheme (not $real_scheme) because it has no trust-proxy map.
        # Operators running LXC behind a TLS-terminating proxy should configure the
        # upstream proxy to handle X-Forwarded-Proto and set RACKULA_BASE_URL accordingly.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $rackula_api_authorization;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Handle API unavailable gracefully
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    location @api_unavailable {
        default_type application/json;
        return 503 '{"error": "Persistence API unavailable"}';
    }

    # Container health check
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # SPA fallback — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers (single source of truth: deploy/lxc/security-headers.conf)
    include /etc/nginx/snippets/security-headers.conf;
}
