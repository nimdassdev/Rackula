name: The Count's Code Census
# Metrics pipeline: runs tests with coverage, publishes octocov report,
# generates shields.io badge JSON, and pushes badges to orphan 'badges' branch.
# Main branch is never directly mutated by this workflow.
# Badge URLs: https://raw.githubusercontent.com/RackulaLives/Rackula/report/badges/docs/badges/*.json

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  count:
    name: "Collect Metrics"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # Continue even if coverage thresholds aren't met - we want metrics regardless
        run: npm run test:run -- --coverage || true

      - name: Run octocov
        uses: k1LoW/octocov-action@73d561f65d59e66899ed5c87e4621a913b5d5c20 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: The Count's Commentary
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse current coverage
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(jq -r '.total.lines.pct' coverage/coverage-summary.json 2>/dev/null || echo "0")
          else
            COVERAGE=$(awk -F: '/^LF:/{total+=$2} /^LH:/{hit+=$2} END{if(total>0) printf "%.1f", hit/total*100; else print "0"}' coverage/lcov.info 2>/dev/null || echo "0")
          fi

          # Try to get previous coverage from octocov artifact for comparison
          # If no previous data, we'll just report current coverage
          PREV_COVERAGE=""
          if [ -f ".octocov/report.json" ]; then
            PREV_COVERAGE=$(jq -r '.coverage.covered / .coverage.total * 100' .octocov/report.json 2>/dev/null || echo "")
          fi

          # Calculate delta if we have previous coverage
          if [ -n "$PREV_COVERAGE" ] && [ "$PREV_COVERAGE" != "null" ]; then
            DELTA=$(echo "$COVERAGE - $PREV_COVERAGE" | bc 2>/dev/null || echo "0")
            DELTA_FMT=$(printf "%.1f" "$DELTA" 2>/dev/null || echo "$DELTA")
            DELTA_INT=${DELTA%.*}

            # The Count reacts to CHANGE, not absolute values
            if [ "$DELTA_INT" -gt 2 ]; then
              QUOTE="*\"$COVERAGE%! That is MORE than before! +${DELTA_FMT}% more things to count! Ah ah ah!\"* 🦇"
              MOOD="is DELIGHTED"
            elif [ "$DELTA_INT" -ge 0 ]; then
              QUOTE="*\"$COVERAGE%... The same as before. Consistent! The Count appreciates consistency. Ah ah ah.\"* 🦇"
              MOOD="is satisfied"
            elif [ "$DELTA_INT" -ge -5 ]; then
              QUOTE="*\"$COVERAGE%... That is ${DELTA_FMT}% fewer things to count. The Count notices. Ah ah ah.\"* 🌙"
              MOOD="is watching"
            else
              QUOTE="*\"$COVERAGE%?! That is ${DELTA_FMT}% FEWER! The Count does not like losing things to count! Ah ah ah!\"* ⚰️"
              MOOD="is CONCERNED"
            fi
          else
            # No previous data - just report current
            QUOTE="*\"$COVERAGE%! The Count has begun counting. Ah ah ah!\"* 🦇"
            MOOD="is counting"
          fi

          # Post The Count's reaction
          gh pr comment ${{ github.event.pull_request.number }} --body "## 🧛 The Count $MOOD

          $QUOTE

          ---
          <sub>*One coverage report! Ah ah ah!*</sub>"

      - name: Generate shields.io endpoint JSON
        run: |
          # Generate JSON files for shields.io endpoint badges
          # These match the style of existing badges (for-the-badge, Dracula colors)
          mkdir -p docs/badges

          # Parse coverage
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(jq -r '.total.lines.pct' coverage/coverage-summary.json 2>/dev/null || echo "0")
          else
            COVERAGE=$(awk -F: '/^LF:/{total+=$2} /^LH:/{hit+=$2} END{if(total>0) printf "%.1f", hit/total*100; else print "0"}' coverage/lcov.info 2>/dev/null || echo "0")
          fi

          # Parse code-to-test ratio from octocov output or calculate
          CODE_LINES=$(find src/lib -name "*.ts" -o -name "*.svelte" | grep -v test | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
          TEST_LINES=$(find src -name "*.test.ts" -o -name "*.spec.ts" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
          if [ "$CODE_LINES" -gt 0 ] && [ "$TEST_LINES" -gt 0 ]; then
            RATIO=$(echo "scale=1; $TEST_LINES / $CODE_LINES" | bc)
            RATIO_DISPLAY="1:$RATIO"
          else
            RATIO_DISPLAY="--"
          fi

          # Get test execution time from environment or estimate
          TIME_DISPLAY="${TEST_TIME:-~60s}"

          # Coverage badge JSON (purple - bd93f9)
          cat > docs/badges/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${COVERAGE}%",
            "color": "bd93f9"
          }
          EOF

          # Ratio badge JSON (pink - ff79c6)
          cat > docs/badges/ratio.json << EOF
          {
            "schemaVersion": 1,
            "label": "code:test",
            "message": "$RATIO_DISPLAY",
            "color": "ff79c6"
          }
          EOF

          # Time badge JSON (green - 50fa7b)
          cat > docs/badges/time.json << EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "$TIME_DISPLAY",
            "color": "50fa7b"
          }
          EOF

      - name: Upload badge artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: badge-json
          path: docs/badges/
          retention-days: 1

  publish-badges:
    name: "Publish Badges"
    needs: [count]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download badge artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: badge-json
          path: docs/badges/

      - name: Push badges to badges branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Push badge JSON files to a dedicated orphan branch.
          # This keeps main clean while providing stable URLs for shields.io.
          # If this step fails, badges show last successful values — re-run to retry.
          cd docs/badges
          git init --initial-branch=report/badges
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --cached --quiet && echo "No badge changes to commit" && exit 0
          git commit -m "chore: update coverage badges [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin report/badges --force
