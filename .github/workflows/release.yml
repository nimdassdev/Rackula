# Creates a GitHub Release when a version tag (CalVer vYY.M.MICRO or legacy SemVer)
# is pushed, or when manually triggered via workflow_dispatch.
name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip full E2E (emergency hotfix only)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  full-test:
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/test-full.yml
    permissions:
      contents: read
      issues: write

  create-release:
    needs: [full-test]
    if: ${{ always() && (needs.full-test.result == 'success' || needs.full-test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Warn if tests were skipped
        if: ${{ needs.full-test.result == 'skipped' }}
        run: |
          echo "::warning::Release created with skip_tests=true — full E2E tests were bypassed"
          echo "⚠️ **Tests bypassed**: This release was created with \`skip_tests=true\`. Full E2E tests were not run." >> $GITHUB_STEP_SUMMARY

      - name: Extract version number
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"  # Remove 'v' prefix (e.g., v26.6.0 → 26.6.0)
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT

      - name: Validate changelog entry exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "ERROR: No changelog entry found for version $VERSION"
            echo "Please update CHANGELOG.md before releasing."
            echo ""
            echo "Expected format:"
            echo "## [$VERSION] - YYYY-MM-DD"
            exit 1
          fi
          echo "Changelog entry found for version $VERSION"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract the section between this version header and the next version header
          # Uses awk to capture everything between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)

          # Remove leading/trailing whitespace
          NOTES=$(echo "$NOTES" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          # Handle multiline output for GitHub Actions
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.notes }}"

#
