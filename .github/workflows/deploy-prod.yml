name: Deploy Prod

# Release flow:
# 1. Normal: push a semver tag (v*) → triggers automatically
# 2. Manual: workflow_dispatch with explicit tag → validates tag exists and format
# Both paths run through validate → build → scan → deploy → smoke-test

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v0.7.6). Required for manual dispatch.'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: "Validate Release Context"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      major_minor: ${{ steps.tag.outputs.major_minor }}
    steps:
      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "$TAG" == *$'\n'* || "$TAG" == *$'\r'* ]]; then
            echo "::error::Invalid tag format '$TAG'. Tag must be a single line."
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format '$TAG'. Expected semver like v1.2.3"
            exit 1
          fi

          VERSION="${TAG#v}"
          MAJOR_MINOR="${VERSION%.*}"
          {
            printf 'tag=%s\n' "$TAG"
            printf 'version=%s\n' "$VERSION"
            printf 'major_minor=%s\n' "$MAJOR_MINOR"
          } >> "$GITHUB_OUTPUT"
          echo "✅ Tag format valid: $TAG"

      - name: Verify tag exists (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! git ls-remote --tags "https://github.com/${{ github.repository }}" "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag '$TAG' does not exist in remote. Push the tag first."
            exit 1
          fi
          echo "✅ Tag exists in remote: $TAG"

  build-and-deploy:
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ needs.validate.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ needs.validate.outputs.major_minor }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:buildcache,mode=max
          build-args: |
            VITE_ENV=production
            VITE_UMAMI_ENABLED=true
            VITE_UMAMI_SCRIPT_URL=${{ vars.UMAMI_SCRIPT_URL }}
            VITE_UMAMI_WEBSITE_ID=${{ vars.UMAMI_PROD_WEBSITE_ID }}

  build-persist:
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}-persist
            type=raw,value=persist
            type=raw,value=v${{ needs.validate.outputs.version }}-persist,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push persist image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:buildcache-persist
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:buildcache-persist,mode=max
          build-args: |
            VITE_ENV=production
            VITE_PERSIST_ENABLED=true

  build-api:
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set lowercase image name
        run: echo "API_IMAGE_NAME=${GITHUB_REPOSITORY,,}-api" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ needs.validate.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ needs.validate.outputs.major_minor }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push API image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:buildcache,mode=max

  scan-images:
    needs: [build-and-deploy, build-persist, build-api]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - repo_suffix: ""
            tag: latest
          - repo_suffix: ""
            tag: persist
          - repo_suffix: "-api"
            tag: latest

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image ref
        run: |
          IMAGE_NAME_LC=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME_LC}${{ matrix.image.repo_suffix }}:${{ matrix.image.tag }}"
          IMAGE_CATEGORY=$(echo "${IMAGE_REF}" | tr '/:' '--' | tr -cd '[:alnum:]._-')
          echo "IMAGE_REF=${IMAGE_REF}" >> $GITHUB_ENV
          echo "IMAGE_CATEGORY=${IMAGE_CATEGORY}" >> $GITHUB_ENV

      - name: Scan image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-results.sarif
          # Keep the release gate aligned with configured severity thresholds.
          # Without this, SARIF mode can include lower severities and trip exit-code.
          limit-severities-for-sarif: true
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          version: "v0.69.2"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ env.IMAGE_CATEGORY }}

  deploy:
    # `build-and-deploy`, `build-persist`, and `build-api` push images first.
    # `scan-images` then scans those pushed tags before deploy executes.
    # Trade-off: scan failures block `deploy`, but already-pushed images remain published.
    # (Alternative future flow: scan tar/filesystem artifacts before push.)
    needs: [validate, build-and-deploy, build-persist, build-api, scan-images]
    runs-on: [self-hosted, vps-rackula]
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.tag }}
          sparse-checkout: |
            docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Sync docker-compose.yml to prod
        run: |
          cp docker-compose.yml /opt/rackula/rackula-app/docker-compose.yml
          # Ensure RACKULA_PORT is set (localhost only - Caddy handles external traffic)
          # Uses grep+echo pattern to avoid overwriting other env vars
          ENV_FILE=/opt/rackula/rackula-app/.env
          touch "$ENV_FILE"
          grep -q '^RACKULA_PORT=' "$ENV_FILE" || echo "RACKULA_PORT=127.0.0.1:8080" >> "$ENV_FILE"

      - name: Deploy to prod
        run: |
          cd /opt/rackula/rackula-app
          # Stop old container if exists (name changed from rackula-app to rackula)
          docker stop rackula-app 2>/dev/null && docker rm rackula-app 2>/dev/null || true
          docker compose pull
          docker compose up -d --remove-orphans

  smoke-test:
    needs: deploy
    runs-on: [self-hosted, vps-rackula]
    timeout-minutes: 5
    permissions: {}

    steps:
      - name: Verify deployment
        run: |
          sleep 5
          curl -sf --retry 5 --retry-delay 3 https://count.racku.la

  notify-failure:
    if: ${{ always() && (failure() || cancelled()) }}
    needs: [validate, build-and-deploy, build-persist, build-api, scan-images, deploy, smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Summarize failing jobs
        id: summarize
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          VALIDATED_TAG: ${{ needs.validate.outputs.tag }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const validatedTag = process.env.VALIDATED_TAG || "unknown-tag";

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });

            const failedJobs = jobs.filter((job) =>
              ["failure", "cancelled", "timed_out", "action_required"].includes(job.conclusion),
            );

            const failedLines = failedJobs.length
              ? failedJobs.map((job) => `- ${job.name}: ${job.conclusion} (${job.html_url})`)
              : ["- No failed jobs found; inspect workflow graph for skipped dependencies."];

            core.setOutput("run_url", runUrl);
            core.setOutput("failed_jobs", failedLines.join("\n"));
            core.setOutput("tag_name", validatedTag);

            await core.summary
              .addHeading("Deploy Prod Failure Alert")
              .addRaw(`Run: ${runUrl}\n\n`)
              .addRaw("Failed jobs:\n")
              .addRaw(failedLines.join("\n"))
              .write();

      - name: Ensure alert labels exist
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const labels = [
              {
                name: "ci-alert",
                color: "B60205",
                description: "Automated CI/CD failure alerts",
              },
              {
                name: "automated",
                color: "1D76DB",
                description: "Created or updated by GitHub Actions automation",
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  ...label,
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
              }
            }

      - name: Create or update alert issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TAG_NAME: ${{ steps.summarize.outputs.tag_name }}
          RUN_URL: ${{ steps.summarize.outputs.run_url }}
          FAILED_JOBS: ${{ steps.summarize.outputs.failed_jobs }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tagName = process.env.TAG_NAME || "unknown-tag";
            const runUrl = process.env.RUN_URL;
            const failedJobs = process.env.FAILED_JOBS;
            const title = `CI Alert: Deploy Prod failed for ${tagName}`;

            const body = [
              `Deploy pipeline failure detected for \`${tagName}\`.`,
              "",
              `Run: ${runUrl}`,
              "",
              "Failed jobs:",
              failedJobs,
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Another failure occurred.\n\n${body}`,
              });
              core.notice(`Updated existing alert issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["ci-alert", "automated"],
              });
              core.notice(`Created alert issue #${created.data.number}`);
            }
