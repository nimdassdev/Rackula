name: "The Count's Weekly Census"
# Rolling code health report: runs weekly deep analysis (flaky test
# detection, complexity analysis) and maintains a single rolling
# GitHub issue instead of creating new issues each week.
# Weekly delta is preserved as issue comments for trend tracking.
# Raw metrics are uploaded as artifacts (90-day retention) for historical reference.

on:
  schedule:
    # Run weekly on Sunday at 2am UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  code-health:
    name: "Deep Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ============================================
      # FLAKY TEST DETECTION
      # ============================================
      - name: Detect Flaky Tests
        id: flaky
        run: |
          mkdir -p reports/flaky
          FLAKY_TESTS=""
          FAILED_RUNS=0

          # Run tests 5 times, collect results
          for i in 1 2 3 4 5; do
            echo "=== Test Run $i ===" >> reports/flaky/runs.log
            npm run test:run -- --reporter=json > "reports/flaky/run-$i.json" 2>&1 || true

            # Extract test names and results
            if [ -f "reports/flaky/run-$i.json" ]; then
              jq -r '.testResults[]?.assertionResults[]? | "\(.ancestorTitles | join(" > ")) > \(.title): \(.status)"' \
                "reports/flaky/run-$i.json" 2>/dev/null >> "reports/flaky/run-$i.txt" || true
            fi
          done

          # Compare runs to find inconsistent tests
          if [ -f "reports/flaky/run-1.txt" ]; then
            # Find tests that had different results across runs
            cat reports/flaky/run-*.txt 2>/dev/null | sort | uniq -c | \
              awk '$1 != 5 && $1 > 0 {print substr($0, index($0,$2))}' | \
              sort -u > reports/flaky/flaky-candidates.txt || true

            if [ -s reports/flaky/flaky-candidates.txt ]; then
              FLAKY_COUNT=$(wc -l < reports/flaky/flaky-candidates.txt | tr -d ' ')
              FLAKY_TESTS=$(cat reports/flaky/flaky-candidates.txt | head -10)
            else
              FLAKY_COUNT=0
            fi
          else
            FLAKY_COUNT=0
          fi

          echo "flaky_count=$FLAKY_COUNT" >> $GITHUB_OUTPUT

          # Store flaky tests for later (handle multiline)
          {
            echo "flaky_tests<<EOF"
            echo "$FLAKY_TESTS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ============================================
      # COMPLEXITY ANALYSIS
      # ============================================
      - name: Analyze Complexity
        id: complexity
        run: |
          mkdir -p reports/complexity

          # Run ESLint with complexity rule and capture high-complexity functions
          npx eslint src/lib --rule 'complexity: ["warn", 10]' --format json > reports/complexity/eslint.json 2>/dev/null || true

          # Count high-complexity functions
          if [ -f "reports/complexity/eslint.json" ]; then
            COMPLEX_COUNT=$(jq '[.[].messages[] | select(.ruleId == "complexity")] | length' reports/complexity/eslint.json 2>/dev/null || echo "0")

            # Get top offenders
            COMPLEX_FUNCTIONS=$(jq -r '.[].messages[] | select(.ruleId == "complexity") |
              "\(.message) in \(input_filename // "unknown"):\(.line)"' reports/complexity/eslint.json 2>/dev/null | head -5 || echo "")
          else
            COMPLEX_COUNT=0
            COMPLEX_FUNCTIONS=""
          fi

          echo "complex_count=$COMPLEX_COUNT" >> $GITHUB_OUTPUT

          {
            echo "complex_functions<<EOF"
            echo "$COMPLEX_FUNCTIONS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ============================================
      # CODE METRICS
      # ============================================
      - name: Gather Code Metrics
        id: metrics
        run: |
          # Lines of code
          CODE_LINES=$(find src/lib -name "*.ts" -o -name "*.svelte" | grep -v test | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
          TEST_LINES=$(find src -name "*.test.ts" -o -name "*.spec.ts" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")

          # File counts
          CODE_FILES=$(find src/lib -name "*.ts" -o -name "*.svelte" | grep -v test | wc -l | tr -d ' ')
          TEST_FILES=$(find src -name "*.test.ts" -o -name "*.spec.ts" | wc -l | tr -d ' ')

          echo "code_lines=$CODE_LINES" >> $GITHUB_OUTPUT
          echo "test_lines=$TEST_LINES" >> $GITHUB_OUTPUT
          echo "code_files=$CODE_FILES" >> $GITHUB_OUTPUT
          echo "test_files=$TEST_FILES" >> $GITHUB_OUTPUT

      # ============================================
      # CREATE/UPDATE ROLLING REPORT ISSUE
      # ============================================
      - name: The Count's Rolling Report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FLAKY_COUNT: ${{ steps.flaky.outputs.flaky_count }}
          COMPLEX_COUNT: ${{ steps.complexity.outputs.complex_count }}
          CODE_LINES: ${{ steps.metrics.outputs.code_lines }}
          TEST_LINES: ${{ steps.metrics.outputs.test_lines }}
          CODE_FILES: ${{ steps.metrics.outputs.code_files }}
          TEST_FILES: ${{ steps.metrics.outputs.test_files }}
          FLAKY_TESTS: ${{ steps.flaky.outputs.flaky_tests }}
          COMPLEX_FUNCTIONS: ${{ steps.complexity.outputs.complex_functions }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const now = new Date().toISOString().split('T')[0];

            const flakyCount = parseInt(process.env.FLAKY_COUNT || '0', 10);
            const complexCount = parseInt(process.env.COMPLEX_COUNT || '0', 10);
            const codeLines = process.env.CODE_LINES || '0';
            const testLines = process.env.TEST_LINES || '0';
            const codeFiles = process.env.CODE_FILES || '0';
            const testFiles = process.env.TEST_FILES || '0';
            const flakyTests = process.env.FLAKY_TESTS || '';
            const complexFunctions = process.env.COMPLEX_FUNCTIONS || '';

            const codeLinesValue = parseInt(codeLines, 10);
            const testLinesValue = parseInt(testLines, 10);

            // The Count's mood
            let mood, emoji, quote;
            if (flakyCount > 5 || complexCount > 10) {
              mood = 'is CONCERNED'; emoji = '⚰️';
              quote = '*"The Count has found... problems. Many problems to count! Ah ah ah!"*';
            } else if (flakyCount > 0 || complexCount > 5) {
              mood = 'is watching'; emoji = '🌙';
              quote = '*"Some things need attention. The Count is watching. Ah ah ah."*';
            } else {
              mood = 'is DELIGHTED'; emoji = '🦇';
              quote = '*"Wonderful! Clean code, reliable tests! The Count approves! Ah ah ah!"*';
            }

            const ratio = codeLinesValue > 0
              ? (testLinesValue / codeLinesValue).toFixed(2)
              : 'N/A';

            let flakySec = '';
            if (flakyCount > 0) {
              flakySec = `\n### Flaky Tests Detected\n\nThe following tests showed inconsistent results across 5 runs:\n\n\`\`\`\n${flakyTests}\n\`\`\`\n`;
            }

            let complexSec = '';
            if (complexCount > 0) {
              complexSec = `\n### High Complexity Functions\n\nFunctions exceeding complexity threshold (10):\n\n\`\`\`\n${complexFunctions}\n\`\`\`\n`;
            }

            // Build issue body (current state)
            const body = `## ${emoji} The Count ${mood}

            ${quote}

            ---

            ## Code Metrics

            | Metric | Value |
            |--------|-------|
            | Source Files | ${codeFiles} |
            | Test Files | ${testFiles} |
            | Source LOC | ${codeLines} |
            | Test LOC | ${testLines} |
            | Code:Test Ratio | 1:${ratio} |

            ## Test Quality

            | Metric | Value | Status |
            |--------|-------|--------|
            | Flaky Tests | ${flakyCount} | ${flakyCount === 0 ? '✅' : '⚠️'} |
            | High Complexity | ${complexCount} | ${complexCount <= 5 ? '✅' : '⚠️'} |
            ${flakySec}${complexSec}
            ---

            <sub>*One rolling report! Ah ah ah!* 🦇</sub>
            <sub>Last updated: ${now} by [The Count's Weekly Census](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})</sub>
            `.replace(/^ {12}/gm, '');

            // Ensure labels exist
            for (const label of [
              { name: 'automated', color: '1D76DB', description: 'Created or updated by GitHub Actions automation' },
              { name: 'code-health', color: '0E8A16', description: 'Rolling code health metrics report' }
            ]) {
              try {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              } catch (e) {
                if (e.status !== 422) throw e;
              }
            }

            // Find existing rolling report
            const title = '🧛 Rolling Code Health Report';
            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'automated,code-health', per_page: 100
            });
            const issues = allIssues.filter(i => !i.pull_request);
            const existing = issues.find(i => i.title === title);

            // Find previous bot comment for delta calculation
            let prevMetrics = null;
            if (existing) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: existing.number,
                per_page: 100,
              });
              const botComments = comments
                .filter(c => c.user?.login === 'github-actions[bot]' && c.body?.includes('Weekly Update'))
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              if (botComments.length > 0) {
                const prev = botComments[0].body;
                const parseVal = (label) => {
                  const escapedLabel = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                  const m = prev.match(new RegExp(`\\| ${escapedLabel} \\|\\s*([^|]+)\\|`));
                  if (!m) return null;
                  const raw = m[1].trim().replace(/%$/, '');
                  if (raw === 'N/A') return null;
                  const value = Number(raw);
                  return Number.isFinite(value) ? value : null;
                };
                prevMetrics = {
                  flakyCount: parseVal('Flaky Tests'),
                  complexCount: parseVal('High Complexity'),
                  codeLines: parseVal('Source LOC'),
                  testLines: parseVal('Test LOC'),
                };
              }
            }
            const formatDelta = (current, previous, suffix = '') => {
              if (previous == null || Number.isNaN(current)) return 'N/A';
              const change = current - previous;
              const formatted = Number.isInteger(change)
                ? String(change)
                : change.toFixed(2).replace(/\.?0+$/, '');
              const sign = change > 0 ? '+' : '';
              return `${sign}${formatted}${suffix}`;
            };

            // Build delta comment
            const comment = `### 📊 Weekly Update — ${now}

            | Metric | Current | Δ vs last |
            |--------|---------|-----------|
            | Flaky Tests | ${flakyCount} | ${formatDelta(flakyCount, prevMetrics?.flakyCount)} |
            | High Complexity | ${complexCount} | ${formatDelta(complexCount, prevMetrics?.complexCount)} |
            | Source LOC | ${codeLinesValue} | ${formatDelta(codeLinesValue, prevMetrics?.codeLines)} |
            | Test LOC | ${testLinesValue} | ${formatDelta(testLinesValue, prevMetrics?.testLines)} |

            [Workflow run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})
            `.replace(/^ {12}/gm, '');

            if (existing) {
              // Update the issue body with current metrics
              await github.rest.issues.update({
                owner, repo, issue_number: existing.number, body
              });
              // Add weekly delta as comment
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body: comment
              });
              core.notice(`Updated rolling report issue #${existing.number}`);
            } else {
              // First run — create the issue
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: ['automated', 'code-health']
              });
              // Seed baseline comment so next run can compute deltas from bot history.
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: created.data.number,
                body: comment,
              });
              core.notice(`Created rolling report issue #${created.data.number}`);
            }

      - name: Upload metrics artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-health-metrics-${{ github.run_number }}
          retention-days: 90
          path: |
            reports/
            coverage/

      # ============================================
      # JOB SUMMARY
      # ============================================
      - name: Write Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🧛 The Count's Weekly Census Complete

          | Metric | Value |
          |--------|-------|
          | Flaky Tests | ${{ steps.flaky.outputs.flaky_count }} |
          | High Complexity Functions | ${{ steps.complexity.outputs.complex_count }} |
          | Source LOC | ${{ steps.metrics.outputs.code_lines }} |
          | Test LOC | ${{ steps.metrics.outputs.test_lines }} |

          *Ah ah ah!* 🦇
          EOF