# Trust policy:
# - Triggers: issue comments, PR review comments, PR reviews, new issues mentioning @claude
# - Trust boundary: OWNER, MEMBER, COLLABORATOR only (not CONTRIBUTOR)
#   CONTRIBUTOR is excluded because any merged PR author gets this association,
#   which is too broad for granting write access via Claude.
# - Fork PRs are blocked to prevent exfiltration of secrets.
# Permissions:
#   contents:write     - Claude needs to push commits to branches
#   pull-requests:write - Claude needs to create/update PRs and post comments
#   issues:write       - Claude needs to comment on and update issues
#   id-token:write     - Required by claude-code-action for OIDC authentication
#   actions:read       - Claude reads CI results to understand PR status

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
       (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
       (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.sha }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Check for fork context
        id: fork-check
        if: |
          github.event_name == 'pull_request_review_comment' ||
          github.event_name == 'pull_request_review' ||
          github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // For PR-related events, check if the PR comes from a fork
            const pr = context.payload.pull_request;
            if (pr && pr.head && pr.head.repo && pr.head.repo.fork) {
              core.setFailed('Blocked: Claude Code does not run on fork PRs.');
              return;
            }
            // For issue_comment events on PRs, fetch PR details
            const issue = context.payload.issue;
            if (issue && issue.pull_request) {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issue.number
              });
              if (prData.head.repo && prData.head.repo.fork) {
                core.setFailed('Blocked: Claude Code does not run on fork PRs.');
              }
            }

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'
