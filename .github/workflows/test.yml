name: Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  api:
    name: api (typecheck + tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1"

      - name: Install API dependencies
        working-directory: api
        run: bun install --frozen-lockfile

      - name: Typecheck API
        working-directory: api
        run: bun run typecheck

      - name: Run API tests
        working-directory: api
        run: bun test

  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check compose parity
        run: bash scripts/check-compose-persist-parity.sh

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:run

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E tests
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Tier 2/3 of the two-tier E2E model (spike #1994). The full browser suite
  # runs on the self-hosted ci-runner only after the baseline smoke passes.
  # Org PRs use the e2e-trusted environment (auto-runs); fork PRs use
  # e2e-approval, which requires ggfevans to review and approve before any
  # untrusted code executes on the homelab runner.
  e2e-self-hosted:
    name: e2e (self-hosted full suite)
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, ci-runner]
    timeout-minutes: 30
    environment: ${{ github.event.pull_request.head.repo.full_name == 'RackulaLives/Rackula' && 'e2e-trusted' || 'e2e-approval' }}
    permissions:
      contents: read
    steps:
      # The ci-runner is not ephemeral: it reuses _work across jobs, and a prior
      # sparse checkout (e.g. the LXC gate) leaves an index that makes
      # actions/checkout's clean fail with "not uptodate; will not remove".
      # Wipe the workspace first so the checkout below starts from a clean slate.
      - name: Clean self-hosted workspace
        run: |
          if [ -n "$GITHUB_WORKSPACE" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            find "$GITHUB_WORKSPACE" -mindepth 1 -delete
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-full-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-full-

      - name: Install Playwright browsers
        # --with-deps installs OS libraries via apt and needs root; fall back to a
        # plain browser install when the self-hosted ci-runner already has them.
        run: npx playwright install --with-deps || npx playwright install

      - name: Run full E2E tests
        run: npm run test:e2e

      # The full config (e2e/playwright.config.ts) uses the blob reporter in CI,
      # which writes to blob-report/. View it with `npx playwright merge-reports
      # --reporter html ./blob-report`, the same as the sharded test-full.yml.
      - name: Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: blob-report-self-hosted
          path: blob-report/
          retention-days: 7

  visual:
    name: visual regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npm run test:e2e:visual

      # Diff, actual, and expected images land in test-results/ on failure.
      - name: Upload visual diff artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: visual-regression-diff
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  a11y:
    name: a11y (axe-core)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run axe-core accessibility scans
        run: npm run test:e2e:a11y

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-a11y
          path: playwright-report/
          retention-days: 7
