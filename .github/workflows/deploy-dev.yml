name: Deploy Dev

on:
  push:
    branches: [main]
    # Globs must be `dir/**` to match files inside a directory; a bare `dir/`
    # matches nothing, which silently disabled push deploys (#1924). Cover every
    # input that affects the built images and the deploy step.
    paths:
      - api/**
      - src/**
      - deploy/**
      - assets/**
      - static/**
      - login.html
      - package.json
      - package-lock.json
      - docker-compose.yml
      - vite.config.*
      - svelte.config.*
      - tsconfig*.json
      - index.html
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Tests run in PRs before merge - no need to re-run here
  # For manual test runs, use the test.yml workflow

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set build commit
        # Short hash to match the frontend's commit format (rev-parse --short).
        run: echo "BUILD_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_ENV=development
            APP_COMMIT=${{ env.BUILD_COMMIT }}

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch

      # Pull the base image up front with bounded retry. The build-push-action
      # below uses the default docker driver (no setup-buildx-action), which
      # shares the host image store, so with pull: false (the default) the build
      # reuses this locally-present image and skips the Docker Hub manifest HEAD
      # that times out under transient registry flakes (#2175).
      - name: Pre-pull base image
        working-directory: ./api
        run: |
          image="$(awk '/^[[:space:]]*FROM[[:space:]]/ { print $2; exit }' Dockerfile)"
          echo "Base image: $image"
          for attempt in 1 2 3 4 5; do
            if docker pull "$image"; then
              echo "Pulled $image on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              delay=$((2 ** (attempt - 1)))
              echo "::warning::Pull attempt $attempt for $image failed; retrying in ${delay}s"
              sleep "$delay"
            fi
          done
          echo "::error::Failed to pull $image after 5 attempts"
          exit 1

      - name: Build and push API
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: [build-frontend, build-api]
    runs-on: [self-hosted, vps-rackula]
    environment:
      name: dev
      url: https://d.racku.la
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Sync docker-compose.yml to dev
        run: |
          cp docker-compose.yml /opt/rackula/rackula-dev/docker-compose.yml
          install -m 600 /dev/null /opt/rackula/rackula-dev/.env
          cat > /opt/rackula/rackula-dev/.env << 'EOF'
          RACKULA_PORT=127.0.0.1:8081
          RACKULA_IMAGE=ghcr.io/rackulalives/rackula:main
          RACKULA_API_IMAGE=ghcr.io/rackulalives/rackula-api:main
          RACKULA_CONTAINER_NAME=rackula-dev
          RACKULA_API_CONTAINER_NAME=rackula-api-dev
          CORS_ORIGIN=https://d.racku.la
          ALLOW_INSECURE_CORS=false
          EOF

      - name: Verify data dir is writable by API container (uid 1001)
        run: |
          DATA_DIR=/opt/rackula/rackula-dev/data
          mkdir -p "$DATA_DIR"
          if ! docker run --rm -u 1001:1001 -v "$DATA_DIR":/data busybox \
              sh -c 'touch /data/.write-test && rm -f /data/.write-test'; then
            echo "::error::$DATA_DIR is not writable by uid 1001 (rackula-api container user)."
            echo "::error::Fix once on the host: sudo chown -R 1001:1001 $DATA_DIR"
            exit 1
          fi

      - name: Deploy to dev
        run: |
          cd /opt/rackula/rackula-dev
          docker compose --profile persist pull
          docker compose --profile persist up -d --remove-orphans

  smoke-test:
    needs: deploy
    runs-on: [self-hosted, vps-rackula]
    permissions: {}

    steps:
      - name: Verify deployment
        run: |
          sleep 5
          curl -sf --retry 5 --retry-delay 3 https://d.racku.la
          curl -sf --retry 5 --retry-delay 3 https://d.racku.la/api/layouts
